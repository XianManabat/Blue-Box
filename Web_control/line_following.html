<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Line following</title>
        <link rel="stylesheet" href="lineFollowing.css">
    </head>
    <body>

        <div class="controller-box">

            <!-- forward backward crabwalk -->
            <div class="button-ctrl">
                <div class="left">
                    &#8592;
                </div>
                <div class="right">
                    &#8594;
                </div>
            </div>

            <!-- option screen -->
            <div class="dashbaord">
                <h1>This is dashbaord</h1>
            </div>

            <!-- 360 turn -->
            <div class="joystick">
                <h1>this is joystick</h1>
            </div>
            
        </div>
    </body>
</html>
